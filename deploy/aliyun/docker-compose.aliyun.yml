services:
  openresty:
    build:
      context: ../../services/openresty-api
    container_name: ai-audio-openresty
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../services/openresty-api:/opt/ai-audio-api:ro
