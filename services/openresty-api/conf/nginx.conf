worker_processes 1;
error_log logs/error.log info;

env API_ENV;
env API_VERSION;
env HMAC_SECRET;
env JWT_SECRET;
env JWT_ACCESS_TTL_SECONDS;
env JWT_REFRESH_TTL_SECONDS;
env MYSQL_HOST;
env MYSQL_PORT;
env MYSQL_DATABASE;
env MYSQL_USER;
env MYSQL_PASSWORD;
env REDIS_HOST;
env REDIS_PORT;
env REDIS_PASSWORD;
env REDIS_DB;
env SMS_DRY_RUN;
env ALIYUN_SMS_ACCESS_KEY_ID;
env ALIYUN_SMS_ACCESS_KEY_SECRET;
env ALIYUN_SMS_SIGN_NAME;
env ALIYUN_SMS_TEMPLATE_CODE;
env ALIYUN_SMS_REGION_ID;
env API_DOMAIN;

events {
    worker_connections 1024;
}

http {
    lua_package_path "$prefix/lua/?.lua;$prefix/lua/?/init.lua;;";
    lua_shared_dict captcha_store 20m;
    lua_shared_dict rate_limit_store 20m;

    init_by_lua_block {
        math.randomseed(os.time())
    }

    server {
        listen 8080;
        server_name localhost;

        default_type application/json;

        location = /health {
            content_by_lua_file lua/handlers/health.lua;
        }

        location = /v1/captcha/challenge {
            content_by_lua_file lua/handlers/captcha_challenge.lua;
        }

        location = /v1/captcha/verify {
            content_by_lua_file lua/handlers/captcha_verify.lua;
        }

        location = /v1/auth/sms/send {
            content_by_lua_file lua/handlers/sms_send.lua;
        }

        location = /v1/auth/sms/login {
            content_by_lua_file lua/handlers/sms_login.lua;
        }

        location = /v1/auth/guest/login {
            content_by_lua_file lua/handlers/guest_login.lua;
        }

        location = /v1/auth/refresh {
            content_by_lua_file lua/handlers/auth_refresh.lua;
        }

        location = /v1/auth/session {
            content_by_lua_file lua/handlers/auth_session.lua;
        }

        location = /v1/models/catalog {
            content_by_lua_file lua/handlers/models_catalog.lua;
        }

        location = /v1/devices/report {
            content_by_lua_file lua/handlers/devices_report.lua;
        }

        location = /v1/versions/check {
            content_by_lua_file lua/handlers/versions_check.lua;
        }
    }
}
