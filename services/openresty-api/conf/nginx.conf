worker_processes 1;
error_log logs/error.log info;

events {
    worker_connections 1024;
}

http {
    lua_package_path "$prefix/lua/?.lua;$prefix/lua/?/init.lua;;";
    lua_shared_dict captcha_store 20m;
    lua_shared_dict rate_limit_store 20m;

    init_by_lua_block {
        math.randomseed(os.time())
    }

    server {
        listen 8080;
        server_name localhost;

        default_type application/json;

        location = /health {
            content_by_lua_file lua/handlers/health.lua;
        }

        location = /v1/captcha/challenge {
            content_by_lua_file lua/handlers/captcha_challenge.lua;
        }

        location = /v1/captcha/verify {
            content_by_lua_file lua/handlers/captcha_verify.lua;
        }

        location = /v1/auth/sms/send {
            content_by_lua_file lua/handlers/sms_send.lua;
        }

        location = /v1/auth/sms/login {
            content_by_lua_file lua/handlers/sms_login.lua;
        }

        location = /v1/models/catalog {
            content_by_lua_file lua/handlers/models_catalog.lua;
        }

        location = /v1/devices/report {
            content_by_lua_file lua/handlers/devices_report.lua;
        }

        location = /v1/versions/check {
            content_by_lua_file lua/handlers/versions_check.lua;
        }
    }
}

